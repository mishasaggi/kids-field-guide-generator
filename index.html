<!DOCTYPE html>
<html>
<head>
  <title>Prompt Generator</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 600px;
    }
    .cell {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 60px;
      font-size: 14px;
    }
  </style>
</head>
<body>
<h2>Exploration Grid</h2>
<div class="grid" id="grid"></div>
<script src="generateActivityGrid.js"></script>
</body>
</html>
